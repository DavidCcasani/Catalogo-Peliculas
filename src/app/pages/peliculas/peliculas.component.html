<h2>Películas</h2>
<a routerLink="/agregar" class="btn">Agregar nueva</a>

<ul *ngIf="peliculas.length > 0; else vacio">
  <li *ngFor="let pelicula of peliculas">
    <strong>{{ pelicula.titulo }}</strong> - {{ pelicula.director }} ({{ pelicula.anio }})
    <button (click)="editar(pelicula.id)">Editar</button>
    <button (click)="eliminar(pelicula.id!)">Eliminar</button>
  </li>
</ul>

<ng-template #vacio>
  <p>No hay películas registradas.</p>
</ng-template>
